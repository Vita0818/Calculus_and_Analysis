name: Update Drive Index

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: write

jobs:
  sync-drive-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download latest drive index
        env:
          DRIVE_INDEX_SOURCE_URL: ${{ secrets.DRIVE_INDEX_SOURCE_URL }}
        run: |
          if [ -z "$DRIVE_INDEX_SOURCE_URL" ]; then
            echo "DRIVE_INDEX_SOURCE_URL is not set." >&2
            exit 1
          fi

          curl -fL "$DRIVE_INDEX_SOURCE_URL" -o data/drive-index.json
          python -m json.tool data/drive-index.json > /tmp/drive-index.pretty.json
          mv /tmp/drive-index.pretty.json data/drive-index.json

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- data/drive-index.json; then
            echo "No changes in data/drive-index.json"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/drive-index.json
          git commit -m "chore: update drive index cache"
          git push
