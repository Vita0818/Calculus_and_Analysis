<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vita's 数学分析小站</title>
    <meta
      name="description"
      content="Vita 的数学分析/微积分 PDF 浏览站，资料托管于 Google Drive。"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="formula-chips" aria-hidden="true">
      <span class="chip chip-blue">Taylor Formula</span>
      <span class="chip chip-green">Stokes Theorem</span>
      <span class="chip chip-blue">Green Formula</span>
      <span class="chip chip-green">Gauss Formula</span>
      <span class="chip chip-blue">∫ f(x) dx</span>
      <span class="chip chip-green">∇ · F</span>
      <span class="chip chip-blue">e^{iπ}+1=0</span>
      <span class="chip chip-green">lim sin x / x = 1</span>
      <span class="chip chip-blue">Σ 1/n² = π²/6</span>
      <span class="chip chip-green">ε-δ</span>
      <span class="chip chip-blue">∂²f/∂x∂y</span>
    </div>

    <header class="site-header card">
      <div class="brand">
        <img src="assets/avatar.png" alt="Vita 头像" class="avatar" />
        <div>
          <h1 class="site-title"><span class="title-en">Vita's</span> <span class="title-cn">数学分析小站</span></h1>
          <p>祝玩得开心！</p>
        </div>
      </div>
      <a
        id="openAllBtn"
        class="btn"
        href="https://drive.google.com/drive/folders/1onVR2v7-_WzvPypCS8r8NX8wMphymSpb?usp=drive_link"
        target="_blank"
        rel="noopener noreferrer"
      >
        打开全部资料文件夹
      </a>
    </header>

    <section class="toolbar card">
      <input id="searchInput" type="search" placeholder="搜索文件夹或 PDF..." aria-label="搜索" />
      <button id="backBtn" class="btn ghost" type="button">返回上一级</button>
      <nav id="breadcrumb" class="breadcrumb" aria-label="当前路径"></nav>
    </section>

    <main class="layout">
      <aside class="sidebar card">
        <h2>文件夹</h2>
        <nav id="folderTree" class="folder-tree" aria-label="完整文件夹树"></nav>
      </aside>

      <section class="file-view card">
        <div class="view-head">
          <h2 id="viewTitle">全部资料</h2>
          <span id="resultCount" class="muted"></span>
        </div>
        <div id="contentList" class="content-list"></div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
